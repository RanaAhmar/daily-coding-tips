name: Daily Activity Update

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 2 * * *"
    - cron: "0 4 * * *"
    - cron: "0 6 * * *"
    - cron: "0 8 * * *"
    - cron: "0 10 * * *"
    - cron: "0 12 * * *"
    - cron: "0 14 * * *"
    - cron: "0 16 * * *"
    - cron: "0 18 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update activity log
        run: |
          date >> activity.log
          git config --global user.name "Stackaura Bot"
          git config --global user.email "bot@stackaura.com"
          git add activity.log
          git commit -m "chore: daily activity update [skip ci]"
          git push origin HEAD
